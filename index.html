<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Tambon Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FDFBF7;
            --primary-red: #D62828;
            --primary-yellow: #F4A261;
            --accent-yellow: #E9C46A;
            --text-dark: #2B2D42;
            --card-bg: #FFFFFF;
            --border-color: #E2E8F0;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        /* ระบบสลับหน้าเดี่ยว (SPA) */
        .view { display: none; max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .view.active { display: block; }

        .brand-title {
            text-align: center; font-size: 32px; font-weight: 700; margin-bottom: 25px;
            color: var(--primary-red); border-bottom: 4px solid var(--primary-yellow);
            display: inline-block; padding-bottom: 5px;
        }
        
        .center-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
        .minimal-box { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 35px; width: 100%; max-width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; }
        input[type="text"], input[type="password"], select, textarea {
            width: 100%; padding: 12px; box-sizing: border-box;
            font-family: 'Sarabun', sans-serif; border: 1px solid var(--border-color);
            border-radius: 8px; background-color: #FCFCFA; transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary-red); background-color: #FFF; }

        .tabs-container { display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: #F1F5F9; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 500; font-size: 14px; white-space: nowrap; transition: 0.2s; }
        .tab-btn.active { background: var(--primary-red); color: white; }

        /* แผงคีย์บอร์ดคณิตศาสตร์ */
        .math-toolbar { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
        .math-btn { background: #E2E8F0; padding: 5px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .math-btn:hover { background: #CBD5E1; }

        button { font-family: 'Sarabun', sans-serif; font-weight: 500; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background-color: var(--primary-red); color: white; width: 100%; font-size: 16px; }
        .btn-primary:hover { background-color: #B31F1F; }
        .btn-secondary { background-color: var(--accent-yellow); color: var(--text-dark); }
        .btn-secondary:hover { background-color: #DFBA5C; }
        .btn-danger { background-color: #EF4444; color: white; }
        .btn-danger:hover { background-color: #DC2626; }
        .btn-link { background: none; color: #64748B; text-decoration: underline; margin-top: 15px; font-size: 14px; }

        /* การจัดเรียงกล่องแบบแถวนอน 4 กล่อง */
        .quiz-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 25px; }
        @media (max-width: 1024px) { .quiz-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .quiz-grid { grid-template-columns: 1fr; } }

        .quiz-card { background: white; border: 1px solid var(--border-color); border-top: 5px solid var(--primary-red); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.01); }

        .manage-layout { display: grid; grid-template-columns: 280px 1fr; gap: 30px; margin-top: 20px; }
        @media (max-width: 768px) { .manage-layout { grid-template-columns: 1fr; } }
        .sidebar { background: white; border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; }
        
        .question-node { padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--border-color); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 500; }
        .question-node.active { background-color: #FFFDF9; border-color: var(--primary-yellow); }

        /* วงกลมจุดสีบอกสถานะ */
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background-color: #CBD5E1; }
        .status-dot.green { background-color: #22C55E; }
        .status-dot.red { background-color: #EF4444; }
        .status-dot.yellow { background-color: #EAB308; }

        .score-box { margin-top: 15px; background: #FFFBFB; border-radius: 8px; padding: 12px; font-size: 13px; border: 1px dashed #FED7D7; }
        .score-box ul { padding-left: 15px; margin: 5px 0 0 0; }
        .quiz-img { max-width: 100%; max-height: 200px; object-fit: contain; border-radius: 6px; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

    <div id="view-landing" class="view active">
        <div class="center-wrapper">
            <div class="brand-title">Quiz Tambon Platform</div>
            <div class="minimal-box">
                <h3 style="margin-top:0;">👤 ผู้เข้าทดสอบ (Players)</h3>
                <div class="form-group">
                    <label>ชื่อ - นามสกุล / ชื่อเล่น :</label>
                    <input type="text" id="playerNameInput" placeholder="กรอกชื่อเพื่อเข้าทำข้อสอบ...">
                </div>
                <button class="btn-primary" id="btnPlayerLogin" style="background-color: var(--primary-yellow); color: #2B2D42; font-weight: bold;">Enter เข้าสู่ระบบ</button>
                <center><button class="btn-link" onclick="switchView('view-admin-login')">เข้าสู่ระบบในฐานะ Admin</button></center>
            </div>
        </div>
    </div>

    <div id="view-admin-login" class="view">
        <div class="center-wrapper">
            <div class="brand-title">Admin Authentication</div>
            <div class="minimal-box">
                <h3 style="margin-top:0;">🔒 ผู้ดูแลระบบ (Admin)</h3>
                <div class="form-group">
                    <label>Password :</label>
                    <input type="password" id="adminPassword" placeholder="กรอกรหัสผ่าน (tkit1)...">
                </div>
                <button class="btn-primary" id="btnAdminLogin">Enter</button>
                <center><button class="btn-link" onclick="switchView('view-landing')">กลับไปหน้าหลักผู้เล่น</button></center>
            </div>
        </div>
    </div>

    <div id="view-player-dashboard" class="view">
        <div style="display:flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px;">
            <h2>สวัสดีคุณ: <span id="displayPlayerName" style="color:var(--primary-red);"></span> ✏️</h2>
            <button class="btn-secondary" onclick="switchView('view-landing')">ออกจากระบบ</button>
        </div>
        <h3>เลือกแท็บวิชาที่ต้องการสอบ:</h3>
        <div class="tabs-container" id="playerSubjectTabs"></div>
        <div id="playerQuizGrid" class="quiz-grid"></div>
    </div>

    <div id="view-player-quiz" class="view">
        <div style="border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; display:flex; justify-content: space-between; align-items:center;">
            <div>
                <h2 id="playerQuizTitle">ชุดข้อสอบ: ...</h2>
                <small>ผู้สอบ: <span id="displayPlayerNameQuiz"></span></small>
